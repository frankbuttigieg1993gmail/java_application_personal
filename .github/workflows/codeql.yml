name: "CodeQL Scan v2" 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 1' # Runs every Monday at 01:30 UTC

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ] # Use 'java' if you do not use Kotlin

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21' # Match your project's Java version
        distribution: 'temurin'

    # Set up Gradle and configure caching natively
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'java'

    # Force Gradle 9.6.1 to use the system Java 21 JDK and ignore toolchain isolation 
    - name: Build with Gradle
      run: |
        ./gradlew clean compileJava \
          --no-build-cache \
          --no-configuration-cache \
          --no-daemon \
          -Porg.gradle.java.installations.auto-download=false \
          -Dorg.gradle.java.home=$JAVA_HOME \
          -Dorg.gradle.workers.max=1 \
          -Porg.gradle.compiler.execution.strategy=in-process \
          -x test

    # Perform the CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

